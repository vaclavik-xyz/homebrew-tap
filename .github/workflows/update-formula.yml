name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula and cask
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/vaclavik-xyz/readOutRS/releases/download/${TAG}"

          # Download release assets and compute SHA256
          for LABEL in macos-arm64 macos-x64 linux-x64; do
            URL="${BASE_URL}/readOutRS-${LABEL}.tar.gz"
            echo "Downloading ${URL}..."
            SHA=$(curl -sL "${URL}" | sha256sum | cut -d' ' -f1)
            echo "${LABEL}: ${SHA}"
            export "SHA_${LABEL//-/_}=${SHA}"
          done

          # DMG checksums for cask
          for LABEL in macos-arm64 macos-x64; do
            URL="${BASE_URL}/readOut-${LABEL}.dmg"
            echo "Downloading ${URL}..."
            SHA=$(curl -sL "${URL}" | sha256sum | cut -d' ' -f1)
            echo "dmg-${LABEL}: ${SHA}"
            export "DMG_${LABEL//-/_}=${SHA}"
          done

          # Update formula
          cat > Formula/readout.rb << RUBY
          class Readout < Formula
            desc "Real-time measurement dashboard for SCPI multimeters and USB-C power meters"
            homepage "https://github.com/vaclavik-xyz/readOutRS"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/readOutRS-macos-arm64.tar.gz"
                sha256 "${SHA_macos_arm64}"
              else
                url "${BASE_URL}/readOutRS-macos-x64.tar.gz"
                sha256 "${SHA_macos_x64}"
              end
            end

            on_linux do
              url "${BASE_URL}/readOutRS-linux-x64.tar.gz"
              sha256 "${SHA_linux_x64}"
            end

            def install
              bin.install "readout-gui" if File.exist?("readout-gui")
              bin.install "readout-tui" if File.exist?("readout-tui")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/readout-tui --version 2>&1", 0)
            end
          end
          RUBY

          # Update cask
          cat > Casks/readout.rb << RUBY
          cask "readout" do
            version "${VERSION}"

            if Hardware::CPU.arm?
              url "${BASE_URL}/readOut-macos-arm64.dmg"
              sha256 "${DMG_macos_arm64}"
            else
              url "${BASE_URL}/readOut-macos-x64.dmg"
              sha256 "${DMG_macos_x64}"
            end

            name "readOut"
            desc "Real-time measurement dashboard for SCPI multimeters and USB-C power meters"
            homepage "https://github.com/vaclavik-xyz/readOutRS"

            app "readOut.app"

            zap trash: [
              "~/Library/Preferences/xyz.vaclavik.readout.plist",
            ]
          end
          RUBY

      - name: Commit and push
        env:
          TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/vaclavik-xyz/homebrew-tap.git"
          git add Formula/readout.rb Casks/readout.rb
          git commit -m "Update readout to ${VERSION}"
          git push
